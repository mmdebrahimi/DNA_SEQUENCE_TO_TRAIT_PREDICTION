name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (deterministic decoder + dev tools; no torch/GPU)
        run: pip install -e ".[dev]"
      - name: CLI smoke
        run: dna-decode list
      - name: Tests
        # The two pipeline-predict e2e files exercise the optional foundation-model
        # ([ml]) extra (xgboost) and are excluded here; the deterministic decoder —
        # the shipped product — needs none of it. Docker/BLAST-dependent tests skip
        # cleanly when those binaries are absent on the runner.
        run: >
          pytest tests/ -q
          --ignore=tests/test_pipeline_predict_e2e.py
          --ignore=tests/test_pipeline_predict_genome_input_e2e.py
